version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
